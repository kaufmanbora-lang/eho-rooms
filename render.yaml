services:
  - type: web
    name: echoroom
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: MAX_VOICE_SEATS
        value: 10
      - key: DATABASE_URL
        fromDatabase:
          name: echoroom-db
          property: connectionString

databases:
  - name: echoroom-db
    databaseName: echoroom
    user: echoroom
    plan: basic-256mb
